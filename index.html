<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Polyglossia — learn the languages the big apps forgot</title>
  <meta name="description" content="A free, open, document-driven language learning platform for under-served languages. CEFR-aligned lessons, script practice, and cultural notes.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Non-render-blocking font load: the page must never stall waiting on
       Google Fonts (blocked/slow networks, corporate firewalls, offline-first
       use) — load it async and swap in once/if it arrives. -->
  <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+Cherokee:wght@400;700&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+Cherokee:wght@400;700&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+Cherokee:wght@400;700&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/">🌐 <span>Polyglossia</span></a>
    <div class="topbar-stats">
      <span class="stat" id="stat-streak" title="Day streak">🔥 <b>0</b></span>
      <span class="stat" id="stat-xp" title="Total XP">⭐ <b>0</b></span>
    </div>
  </header>

  <main id="app" class="app">
    <div class="loading">Loading course…</div>
  </main>

  <nav class="bottomnav" id="bottomnav">
    <a href="#/" data-nav="learn"><span class="nav-ico">📚</span>Learn</a>
    <a href="#/practice" data-nav="practice"><span class="nav-ico">🏋️</span>Practice<span class="nav-badge" id="nav-practice-badge" hidden></span></a>
    <a href="#/culture" data-nav="culture"><span class="nav-ico">🏛️</span>Culture</a>
    <a href="#/stats" data-nav="stats"><span class="nav-ico">📊</span>Stats</a>
    <a href="#/languages" data-nav="languages"><span class="nav-ico" id="nav-lang-ico">🌐</span>Language</a>
  </nav>

  <script type="module" src="js/main.js"></script>
</body>
</html>
