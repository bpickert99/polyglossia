# Rebuilds course data whenever source documents change.
#
# Setup (one time): add your Anthropic API key as a repository secret named
# ANTHROPIC_API_KEY (Settings → Secrets and variables → Actions → New repository secret).
#
# Then: upload documents to sources/<language>/ (GitHub web UI: "Add file → Upload files")
# and this workflow regenerates data/<language>/ and commits the result, which in turn
# triggers the Pages deployment.

name: Build course from sources

on:
  push:
    branches: [main]
    paths:
      - "sources/**"
      - "scripts/build-course.mjs"
  workflow_dispatch:
    inputs:
      language:
        description: "Language code to rebuild (blank = all changed)"
        required: false

permissions:

concurrency:
  group: build-course
  cancel-in-progress: false

jobs:
  build:
        steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build course data with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/build-course.mjs ${{ inputs.language }}

      - name: Commit regenerated course data
        run: |
          git config user.name "polyglossia-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No course changes to commit."
          else
            git commit -m "Rebuild course data from updated sources"
            git push
          fi
